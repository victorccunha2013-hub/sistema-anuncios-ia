name: Deploy Frontend to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20 # <-- Corrigido aqui de node-size para node-version

      - name: Install Dependencies
        run: |
          cd frontend
          npm install
          
      - name: Build Project
        run: |
          cd frontend
          npm run build
        env:
          VITE_API_URL: https://seu-backend.onrender.com # Substitua pela URL real do seu backend se necessário

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: frontend/dist
          branch: gh-pages